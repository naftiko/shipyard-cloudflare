---
naftiko: "1.0.0-alpha2"

info:
  label: "Shipyard Fleet Management"
  description: "Maritime fleet management capability — exposes MCP tools, skills, and REST APIs for ship registry, legacy dockyard, and voyage planning."
  tags:
    - Maritime
    - Fleet
    - MCP
  created: "2026-03-27"
  modified: "2026-03-27"

binds:
  - namespace: "registry-env"
    description: "Maritime Registry API credentials and config."
    location: "file:///./shared/secrets.yaml"
    keys:
      REGISTRY_TOKEN: "registry-bearer-token"
      REGISTRY_VERSION: "registry-api-version"
      MCP_SERVER_TOKEN: "mcp-server-token"
  - namespace: "dockyard-env"
    description: "Legacy Dockyard API credentials."
    location: "file:///./shared/secrets.yaml"
    keys:
      DOCKYARD_API_KEY: "dockyard-api-key"

capability:
  consumes:
    - import: registry
      location: ./shared/step11-registry-consumes.yml
    - import: legacy
      location: ./shared/legacy-consumes.yaml

  exposes:
    - type: mcp
      address: "0.0.0.0" # Needed in Docker context. Permits to access the MCP with localhost from outside the container.
      port: 3001
      namespace: shipyard-tools
      authentication:
        type: bearer
        token: "{{MCP_SERVER_TOKEN}}"
      description: "Shipyard MCP tools for fleet management"
      tools:
        - name: list-ships
          description: "List ships in the shipyard, optionally filtered by status"
          inputParameters:
            - name: status
              type: string
              required: false
              description: "Filter by operational status"
          call: registry.list-ships
          with:
            status: shipyard-tools.status
          outputParameters:
            - type: array
              mapping: "$."
              items:
                type: object
                properties:
                    imo:
                      type: string
                      mapping: "$.imo_number"
                    name:
                      type: string
                      mapping: "$.vessel_name"
                    type:
                      type: string
                      mapping: "$.vessel_type"
                    flag:
                      type: string
                      mapping: "$.flag_code"
                    status:
                      type: string
                      mapping: "$.operational_status"
        - name: get-ship
          description: "Retrieve a ship's details by IMO number"
          inputParameters:
            - name: imo
              type: string
              required: true
              description: "IMO number of the ship"
          call: registry.get-ship
          with:
            imo_number: shipyard-tools.imo
          outputParameters:
            - type: object
              properties:
                imo:
                  type: string
                  mapping: "$.imo_number"
                name:
                  type: string
                  mapping: "$.vessel_name"
                type:
                  type: string
                  mapping: "$.vessel_type"
                flag:
                  type: string
                  mapping: "$.flag_code"
                status:
                  type: string
                  mapping: "$.operational_status"
                specs:
                  type: object
                  properties:
                    yearBuilt:
                      type: number
                      mapping: "$.year_built"
                    tonnage:
                      type: number
                      mapping: "$.gross_tonnage"
                    length:
                      type: number
                      mapping: "$.dimensions.length_overall"
        - name: list-legacy-vessels
          description: "List vessels from the legacy Dockyard, optionally filtered by status"
          inputParameters:
            - name: status
              type: string
              required: false
              description: "Filter by operational status (active, laid_up, scrapped)"
          call: legacy.list-vessels
          with:
            status: shipyard-tools.status
          outputParameters:
            - type: array
              mapping: "$.vessel"
              items:
                type: object
                properties:
                    vesselCode:
                      type: string
                      mapping: "$.vesselCode"
                    name:
                      type: string
                      mapping: "$.vesselName"
                    type:
                      type: string
                      mapping: "$.category"
                    flag:
                      type: string
                      mapping: "$.flagState"
                    status:
                      type: string
                      mapping: "$.operationalStatus"
        - name: create-voyage
          description: "Plan a new voyage with ship, crew, route, and dates"
          inputParameters:
            - name: shipImo
              type: string
              required: true
              description: "IMO number of the ship"
            - name: departurePort
              type: string
              required: true
              description: "Port of departure"
            - name: arrivalPort
              type: string
              required: true
              description: "Port of arrival"
            - name: departureDate
              type: string
              required: true
              description: "Departure date (ISO-8601)"
            - name: arrivalDate
              type: string
              required: true
              description: "Arrival date (ISO-8601)"
            - name: crewIds
              type: array
              required: true
              description: "List of crew member IDs"
            - name: cargoIds
              type: array
              required: false
              description: "List of cargo item IDs (optional)"
          call: registry.create-voyage
          with:
            shipImo: shipyard-tools.shipImo
            departurePort: shipyard-tools.departurePort
            arrivalPort: shipyard-tools.arrivalPort
            departureDate: shipyard-tools.departureDate
            arrivalDate: shipyard-tools.arrivalDate
            crewIds: shipyard-tools.crewIds
            cargoIds: shipyard-tools.cargoIds
          hints:
            readOnly: false
            destructive: false
            idempotent: false
            openWorld: true
          outputParameters:
            - type: object
              properties:
                voyageId:
                  type: string
                  mapping: "$.voyageId"
                shipImo:
                  type: string
                  mapping: "$.shipImo"
                route:
                  type: object
                  properties:
                    from:
                      type: string
                      mapping: "$.departurePort"
                    to:
                      type: string
                      mapping: "$.arrivalPort"
                dates:
                  type: object
                  properties:
                    departure:
                      type: string
                      mapping: "$.departureDate"
                    arrival:
                      type: string
                      mapping: "$.arrivalDate"
                crewIds:
                  type: array
                  mapping: "$.crewIds"
                  items:
                    type: string
                    mapping: "$."
                cargoIds:
                  type: array
                  mapping: "$.cargoIds"
                  items:
                    type: string
                    mapping: "$."
                status:
                  type: string
                  mapping: "$.status"
        - name: get-ship-with-crew
          description: "Get ship details with resolved crew names"
          inputParameters:
            - name: imo
              type: string
              required: true
              description: "IMO number of the ship"
          steps:
            - name: get-ship
              type: call
              call: registry.get-ship
              with:
                imo_number: "{{imo}}"
            - name: list-crew
              type: call
              call: registry.list-crew
            - name: resolve-crew
              type: lookup
              index: list-crew
              match: crewId
              lookupValue: "$.get-ship.assignedCrew"
              outputParameters:
                - "fullName"
                - "role"
          mappings:
            - targetName: imo
              value: "$.get-ship.imo_number"
            - targetName: name
              value: "$.get-ship.vessel_name"
            - targetName: type
              value: "$.get-ship.vessel_type"
            - targetName: flag
              value: "$.get-ship.flag_code"
            - targetName: status
              value: "$.get-ship.operational_status"
            - targetName: yearBuilt
              value: "$.get-ship.year_built"
            - targetName: tonnage
              value: "$.get-ship.gross_tonnage"
            - targetName: length
              value: "$.get-ship.dimensions.length_overall"
            - targetName: crew
              value: "$.resolve-crew"
          outputParameters:
            - name: imo
              type: string
            - name: name
              type: string
            - name: type
              type: string
            - name: flag
              type: string
            - name: status
              type: string
            - name: yearBuilt
              type: number
            - name: tonnage
              type: number
            - name: length
              type: number
            - name: crew
              type: array
              items:
                - name: fullName
                  type: string
                - name: role
                  type: string
        - name: get-voyage-manifest
          description: "Assemble a complete voyage manifest with ship, crew, and cargo"
          inputParameters:
            - name: voyageId
              type: string
              required: true
              description: "Voyage ID to build the manifest for"
          steps:
            - name: get-voyage
              type: call
              call: registry.get-voyage
              with:
                voyageId: "{{voyageId}}"
            - name: list-ships
              type: call
              call: registry.list-ships
            - name: resolve-ship
              type: lookup
              index: list-ships
              match: imo-number
              lookupValue: "$.get-voyage.shipImo"
              outputParameters:
                - "vessel_name"
                - "vessel_type"
                - "flag_code"
            - name: list-crew
              type: call
              call: registry.list-crew
            - name: resolve-crew
              type: lookup
              index: list-crew
              match: crewId
              lookupValue: "$.get-voyage.crewIds"
              outputParameters:
                - "fullName"
                - "role"
            - name: list-cargo
              type: call
              call: registry.list-cargo
            - name: resolve-cargo
              type: lookup
              index: list-cargo
              match: cargoId
              lookupValue: "$.get-voyage.cargoIds"
              outputParameters:
                - "type"
                - "description"
                - "weight"
                - "hazardous"
          mappings:
            - targetName: voyageId
              value: "$.get-voyage.voyageId"
            - targetName: status
              value: "$.get-voyage.status"
            - targetName: route.from
              value: "$.get-voyage.departurePort"
            - targetName: route.to
              value: "$.get-voyage.arrivalPort"
            - targetName: ship.name
              value: "$.resolve-ship.vessel_name"
            - targetName: ship.type
              value: "$.resolve-ship.vessel_type"
            - targetName: ship.flag
              value: "$.resolve-ship.flag_code"
            - targetName: crew
              value: "$.resolve-crew"
            - targetName: cargo
              value: "$.resolve-cargo"
          outputParameters:
            - name: voyageId
              type: string
            - name: status
              type: string
            - name: route
              type: object
              properties:
                from:
                  name: from
                  type: string
                to:
                  name: to
                  type: string
            - name: ship
              type: object
              properties:
                name:
                  name: name
                  type: string
                type:
                  name: type
                  type: string
                flag:
                  name: flag
                  type: string
            - name: crew
              type: array
              items:
                - name: fullName
                  type: string
                - name: role
                  type: string
            - name: cargo
              type: array
              items:
                - name: type
                  type: string
                - name: description
                  type: string
                - name: weight
                  type: number
                - name: hazardous
                  type: boolean

    - type: skill
      address: "0.0.0.0" # Needed in Docker context. Permits to access the MCP with localhost from outside the container.
      port: 3003
      namespace: shipyard-skills
      description: "Shipyard skill groups for structured agent discovery"
      skills:
        - name: fleet-ops
          description: "Fleet management — list, search, and inspect ships across all registries"
          tools:
            - name: list-ships
              description: "List ships in the shipyard, optionally filtered by status"
              from:
                sourceNamespace: shipyard-tools
                action: list-ships
            - name: get-ship
              description: "Retrieve a ship's details by IMO number"
              from:
                sourceNamespace: shipyard-tools
                action: get-ship
            - name: list-legacy-vessels
              description: "List vessels from the legacy Dockyard"
              from:
                sourceNamespace: shipyard-tools
                action: list-legacy-vessels
            - name: get-ship-with-crew
              description: "Get ship details with resolved crew names"
              from:
                sourceNamespace: shipyard-tools
                action: get-ship-with-crew
        - name: voyage-ops
          description: "Voyage planning — create and manage voyages"
          tools:
            - name: create-voyage
              description: "Plan a new voyage with ship, crew, route, and dates"
              from:
                sourceNamespace: shipyard-tools
                action: create-voyage
            - name: get-voyage-manifest
              description: "Assemble a complete voyage manifest with ship, crew, and cargo"
              from:
                sourceNamespace: shipyard-tools
                action: get-voyage-manifest

    - type: rest
      address: "0.0.0.0" # Needed in Docker context. Permits to access the MCP with localhost from outside the container.
      port: 3002
      namespace: shipyard-api
      resources:
        - name: ships
          path: "/ships"
          operations:
            - name: list-ships
              method: GET
              inputParameters:
                - name: status
                  in: query
                  type: string
                  description: "Filter by operational status"
              call: registry.list-ships
              with:
                status: shipyard-api.status
              outputParameters:
                - type: array
                  mapping: "$."
                  items:
                    type: object
                    properties:
                        imo:
                          type: string
                          mapping: "$.imo_number"
                        name:
                          type: string
                          mapping: "$.vessel_name"
                        type:
                          type: string
                          mapping: "$.vessel_type"
                        flag:
                          type: string
                          mapping: "$.flag_code"
                        status:
                          type: string
                          mapping: "$.operational_status"
        - name: ship-by-imo
          path: "/ships/{{imo}}"
          operations:
            - name: get-ship
              method: GET
              inputParameters:
                - name: imo
                  in: path
                  type: string
                  description: "IMO number of the ship"
              call: registry.get-ship
              with:
                imo_number: shipyard-api.imo
              outputParameters:
                - type: object
                  properties:
                    imo:
                      type: string
                      mapping: "$.imo_number"
                    name:
                      type: string
                      mapping: "$.vessel_name"
                    type:
                      type: string
                      mapping: "$.vessel_type"
                    flag:
                      type: string
                      mapping: "$.flag_code"
                    status:
                      type: string
                      mapping: "$.operational_status"
                    specs:
                      type: object
                      properties:
                        yearBuilt:
                          type: number
                          mapping: "$.year_built"
                        tonnage:
                          type: number
                          mapping: "$.gross_tonnage"
                        length:
                          type: number
                          mapping: "$.dimensions.length_overall"
        - name: ship-crew
          path: "/ships/{{imo}}/crew"
          operations:
            - name: get-ship-with-crew
              method: GET
              inputParameters:
                - name: imo
                  in: path
                  type: string
                  description: "IMO number of the ship"
              steps:
                - name: get-ship
                  type: call
                  call: registry.get-ship
                  with:
                    imo_number: "{{imo}}"
                - name: list-crew
                  type: call
                  call: registry.list-crew
                - name: resolve-crew
                  type: lookup
                  index: list-crew
                  match: crewId
                  lookupValue: "$.get-ship.assignedCrew"
                  outputParameters:
                    - "fullName"
                    - "role"
              mappings:
                - targetName: imo
                  value: "$.get-ship.imo_number"
                - targetName: name
                  value: "$.get-ship.vessel_name"
                - targetName: type
                  value: "$.get-ship.vessel_type"
                - targetName: flag
                  value: "$.get-ship.flag_code"
                - targetName: status
                  value: "$.get-ship.operational_status"
                - targetName: yearBuilt
                  value: "$.get-ship.year_built"
                - targetName: tonnage
                  value: "$.get-ship.gross_tonnage"
                - targetName: length
                  value: "$.get-ship.dimensions.length_overall"
                - targetName: crew
                  value: "$.resolve-crew"
              outputParameters:
                - name: imo
                  type: string
                - name: name
                  type: string
                - name: type
                  type: string
                - name: flag
                  type: string
                - name: status
                  type: string
                - name: yearBuilt
                  type: number
                - name: tonnage
                  type: number
                - name: length
                  type: number
                - name: crew
                  type: array
                  items:
                    - name: fullName
                      type: string
                    - name: role
                      type: string
        - name: legacy-vessels
          path: "/legacy/vessels"
          operations:
            - name: list-legacy-vessels
              method: GET
              inputParameters:
                - name: status
                  in: query
                  type: string
                  description: "Filter by operational status"
              call: legacy.list-vessels
              with:
                status: shipyard-api.status
              outputParameters:
                - type: array
                  mapping: "$.vessel"
                  items:
                    type: object
                    properties:
                        vesselCode:
                          type: string
                          mapping: "$.vesselCode"
                        name:
                          type: string
                          mapping: "$.vesselName"
                        type:
                          type: string
                          mapping: "$.category"
                        flag:
                          type: string
                          mapping: "$.flagState"
                        status:
                          type: string
                          mapping: "$.operationalStatus"
        - name: voyages
          path: "/voyages"
          operations:
            - name: create-voyage
              method: POST
              inputParameters:
                - name: shipImo
                  in: body
                  type: string
                  description: "IMO number of the ship"
                - name: departurePort
                  in: body
                  type: string
                  description: "Port of departure"
                - name: arrivalPort
                  in: body
                  type: string
                  description: "Port of arrival"
                - name: departureDate
                  in: body
                  type: string
                  description: "Departure date (ISO-8601)"
                - name: arrivalDate
                  in: body
                  type: string
                  description: "Arrival date (ISO-8601)"
                - name: crewIds
                  in: body
                  type: array
                  description: "List of crew member IDs"
                - name: cargoIds
                  in: body
                  type: array
                  description: "List of cargo item IDs (optional)"
              call: registry.create-voyage
              with:
                shipImo: shipyard-api.shipImo
                departurePort: shipyard-api.departurePort
                arrivalPort: shipyard-api.arrivalPort
                departureDate: shipyard-api.departureDate
                arrivalDate: shipyard-api.arrivalDate
                crewIds: shipyard-api.crewIds
                cargoIds: shipyard-api.cargoIds
              outputParameters:
                - type: object
                  properties:
                    voyageId:
                      type: string
                      mapping: "$.voyageId"
                    shipImo:
                      type: string
                      mapping: "$.shipImo"
                    route:
                      type: object
                      properties:
                        from:
                          type: string
                          mapping: "$.departurePort"
                        to:
                          type: string
                          mapping: "$.arrivalPort"
                    dates:
                      type: object
                      properties:
                        departure:
                          type: string
                          mapping: "$.departureDate"
                        arrival:
                          type: string
                          mapping: "$.arrivalDate"
                    crewIds:
                      type: array
                      mapping: "$.crewIds"
                      items:
                        type: string
                        mapping: "$."
                    cargoIds:
                      type: array
                      mapping: "$.cargoIds"
                      items:
                        type: string
                        mapping: "$."
                    status:
                      type: string
                      mapping: "$.status"
        - name: voyage-manifest
          path: "/voyages/{{voyageId}}/manifest"
          operations:
            - name: get-voyage-manifest
              method: GET
              inputParameters:
                - name: voyageId
                  in: path
                  type: string
                  description: "Voyage ID to build the manifest for"
              steps:
                - name: get-voyage
                  type: call
                  call: registry.get-voyage
                  with:
                    voyageId: "{{voyageId}}"
                - name: list-ships
                  type: call
                  call: registry.list-ships
                - name: resolve-ship
                  type: lookup
                  index: list-ships
                  match: imo-number
                  lookupValue: "$.get-voyage.shipImo"
                  outputParameters:
                    - "vessel_name"
                    - "vessel_type"
                    - "flag_code"
                - name: list-crew
                  type: call
                  call: registry.list-crew
                - name: resolve-crew
                  type: lookup
                  index: list-crew
                  match: crewId
                  lookupValue: "$.get-voyage.crewIds"
                  outputParameters:
                    - "fullName"
                    - "role"
                - name: list-cargo
                  type: call
                  call: registry.list-cargo
                - name: resolve-cargo
                  type: lookup
                  index: list-cargo
                  match: cargoId
                  lookupValue: "$.get-voyage.cargoIds"
                  outputParameters:
                    - "type"
                    - "description"
                    - "weight"
                    - "hazardous"
              mappings:
                - targetName: voyageId
                  value: "$.get-voyage.voyageId"
                - targetName: status
                  value: "$.get-voyage.status"
                - targetName: departurePort
                  value: "$.get-voyage.departurePort"
                - targetName: arrivalPort
                  value: "$.get-voyage.arrivalPort"
                - targetName: shipName
                  value: "$.resolve-ship.vessel_name"
                - targetName: shipType
                  value: "$.resolve-ship.vessel_type"
                - targetName: shipFlag
                  value: "$.resolve-ship.flag_code"
                - targetName: crew
                  value: "$.resolve-crew"
                - targetName: cargo
                  value: "$.resolve-cargo"
              outputParameters:
                - name: voyageId
                  type: string
                - name: status
                  type: string
                - name: departurePort
                  type: string
                - name: arrivalPort
                  type: string
                - name: shipName
                  type: string
                - name: shipType
                  type: string
                - name: shipFlag
                  type: string
                - name: crew
                  type: array
                  items:
                    - name: fullName
                      type: string
                    - name: role
                      type: string
                - name: cargo
                  type: array
                  items:
                    - name: type
                      type: string
                    - name: description
                      type: string
                    - name: weight
                      type: number
                    - name: hazardous
                      type: boolean

